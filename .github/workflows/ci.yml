name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: bin

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find zsh
          # fd-find installs as 'fdfind' on Ubuntu — symlink to 'fd'
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd
          # Install fzf
          git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
          ~/.fzf/install --bin
          sudo cp ~/.fzf/bin/fzf /usr/local/bin/
          # Install bats
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run tests
        run: bats tests/

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install fzf ripgrep fd bats-core
      - name: Run tests
        run: bats tests/
